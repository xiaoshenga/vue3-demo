<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#b14aff"/>
      <stop offset="100%" stop-color="#ff2d95"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b14aff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#b14aff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <!-- dark rounded background -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="#0a0518"/>
  <rect x="2" y="2" width="60" height="60" rx="15" fill="none" stroke="url(#neon)" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- ambient glow -->
  <circle cx="32" cy="32" r="26" fill="url(#glow)"/>

  <!-- glowing diamond (outer blurred copy) -->
  <path d="M32 12 L52 32 L32 52 L12 32 Z" fill="none" stroke="url(#neon)" stroke-width="4" stroke-linejoin="round" filter="url(#blur)" opacity="0.9"/>

  <!-- crisp diamond outline -->
  <path d="M32 12 L52 32 L32 52 L12 32 Z" fill="none" stroke="url(#neon)" stroke-width="3" stroke-linejoin="round"/>

  <!-- inner diamond accent -->
  <path d="M32 24 L40 32 L32 40 L24 32 Z" fill="url(#neon)"/>
</svg>
